<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plutonh - Tous mes liens</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://i.imgur.com/3soqRwA.png">
  
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    :root {
      --bg-overlay: rgba(5, 7, 10, 0.5); 
      --card-bg: rgba(17, 24, 39, 0.6);
      --accent: #38bdf8;
      --accent-hover: #818cf8;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --success: #22c55e;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      /* Le fond de base qu'on rendra noir plus tard via une classe */
      background-color: #05070a;
      background-image: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('https://i.imgur.com/Rsv7lQi.png');
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text-main); margin: 0; padding: 0;
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      overflow-x: hidden; transition: background-image 0s; /* Pour couper le fond d'un coup */
    }

    body.universe-destroyed {
      background-image: none !important;
      background-color: #000000 !important;
    }

    /* Calques en arrière-plan */
    #space-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    
    #dark-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000000; opacity: 0; pointer-events: none; z-index: 1;
      transition: opacity 2s ease;
    }

    #vfx-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2; /* Derrière l'interface, devant le fond */
    }

    /* Flash blanc final */
    #flash-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; opacity: 0; pointer-events: none; z-index: 9999;
      transition: opacity 0.2s ease-out;
    }

    .planet { 
      position: absolute; 
      will-change: transform; 
      pointer-events: auto; 
      cursor: pointer; 
      -webkit-tap-highlight-color: transparent; /* CACHE LE CARRE DE SELECTION SUR MOBILE */
    }

    /* L'interface au premier plan (intouchable) */
    .container {
      width: 100%; max-width: 500px; padding: 40px 20px;
      text-align: center; box-sizing: border-box; position: relative; z-index: 10;
      pointer-events: none; /* LAISSE PASSER LES CLICS AU TRAVERS DES ZONES VIDES */
    }
    
    /* HEADER & LOGO */
    .header-section { margin-bottom: 40px; animation: fadeInDown 0.8s ease backwards; }
    
    .logo-container {
      position: relative; display: inline-block; margin-bottom: 20px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      pointer-events: auto; /* GARDE LE LOGO CLIQUABLE */
    }
    
    .logo {
      width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent); box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
      animation: float 4s ease-in-out infinite; position: relative; z-index: 2;
      transition: transform 0.1s;
    }

    .logo:active { transform: scale(0.95); } /* Petit feedback au clic */

    h1 { 
      font-weight: 800; font-size: 2.5rem; margin: 0; letter-spacing: -1px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2;
    }

    .bio { color: var(--text-dim); font-size: 1.1rem; font-weight: 600; margin-top: 5px; letter-spacing: 1px; }
    
    /* LIENS */
    .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
    .link-btn {
      display: flex; align-items: center; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 18px 25px; text-decoration: none; color: var(--text-main);
      font-size: 1.1rem; font-weight: 600; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); position: relative;
      overflow: hidden; cursor: pointer; animation: slideUp 0.6s ease backwards;
      pointer-events: auto; /* GARDE LES BOUTONS CLIQUABLES */
      -webkit-tap-highlight-color: transparent;
    }
    .link-btn span { flex-grow: 1; text-align: center; z-index: 2; }
    .icon { width: 24px; height: 24px; fill: currentColor; z-index: 2; transition: transform 0.3s ease; }
    
    .link-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      transform: skewX(-20deg); transition: left 0.5s ease; z-index: 1;
    }
    .link-btn:hover {
      transform: translateY(-5px) scale(1.02); border-color: var(--accent);
      background: rgba(30, 41, 59, 0.8); box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
    }
    .link-btn:hover .icon { transform: scale(1.2) rotate(5deg); color: var(--accent); }
    .link-btn:hover::before { left: 200%; }
    
    #toast {
      visibility: hidden; min-width: 250px; background-color: var(--success); color: white;
      text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 1000;
      left: 50%; bottom: 20px; transform: translateX(-50%); font-weight: 600; opacity: 0;
      transition: 0.3s; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
    }
    #toast.show { visibility: visible; opacity: 1; bottom: 40px; }

    .links-wrapper a, .links-wrapper div { animation-delay: calc(var(--i) * 0.1s); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div id="dark-overlay"></div>
  <canvas id="vfx-canvas"></canvas>
  <div id="space-container"></div>
  <div id="flash-overlay"></div>
  
  <div class="container">
    <div class="header-section">
      <div class="logo-container" onclick="handleLogoClick(event)">
        <img src="https://i.imgur.com/y8CfXfB.png" alt="PlutonH Logo" class="logo" id="main-logo">
      </div>
      <h1>PLUTONH</h1>
      <div class="bio">Streamer & Créateur de contenu</div>
    </div>
    
    <div class="links-wrapper">
      <a href="https://www.twitch.tv/plutonh" class="link-btn" target="_blank" style="--i:1;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
        <span>Twitch</span>
      </a>
      <a href="https://www.youtube.com/@plutonh.twitch" class="link-btn" target="_blank" style="--i:2;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        <span>YouTube</span>
      </a>
      <a href="https://www.tiktok.com/@plutonh.twitch" class="link-btn" target="_blank" style="--i:3;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
        <span>TikTok</span>
      </a>
      <a href="https://discord.gg/wD9Z85fAQA" class="link-btn" target="_blank" style="--i:4;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        <span>Discord</span>
      </a>
      <div class="link-btn" onclick="copyEmail()" style="--i:5;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <span>Contact</span>
      </div>
    </div>
  </div>
  
  <div id="toast">✅ Adresse email copiée !</div>

  <script>
    // --- GESTION DU CANVAS ET DES VFX ---
    const canvas = document.getElementById('vfx-canvas');
    const ctx = canvas.getContext('2d');
    const mainLogo = document.getElementById('main-logo');
    
    let particles = [];
    let warpLines = [];
    let suckedPlanets = [];
    
    let clickCount = 0;
    let clickResetTimer;
    let isUniverseDestroyed = false; 
    let singularityActive = false;
    let animationId;

    let targetX = 0, targetY = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const rect = mainLogo.getBoundingClientRect();
      targetX = rect.left + rect.width / 2;
      targetY = rect.top + rect.height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    class ShortAspirationParticle {
      constructor() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 120;
        this.x = targetX + Math.cos(angle) * dist;
        this.y = targetY + Math.sin(angle) * dist;
        this.size = Math.random() * 2 + 1;
        this.speed = 3 + Math.random() * 4; 
        this.color = Math.random() > 0.5 ? '#ffffff' : '#38bdf8'; 
        this.active = true;
      }
      update() {
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 20) { this.active = false; return; }
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
      }
    }

    class WarpLine {
      constructor(isIntense) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.max(window.innerWidth, window.innerHeight) * (0.8 + Math.random() * 0.5);
        this.x = targetX + Math.cos(angle) * dist;
        this.y = targetY + Math.sin(angle) * dist;
        this.angle = Math.atan2(targetY - this.y, targetX - this.x);
        
        this.speed = isIntense ? (8 + Math.random() * 6) : (4 + Math.random() * 3);
        this.length = isIntense ? (40 + Math.random() * 40) : (15 + Math.random() * 20);
        
        const isWhite = Math.random() > 0.5;
        const opacity = isIntense ? '0.8' : '0.5';
        this.color = isWhite ? `rgba(255, 255, 255, ${opacity})` : `rgba(56, 189, 248, ${opacity})`;
        this.active = true;
      }
      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        const dx = targetX - this.x; const dy = targetY - this.y;
        if (Math.sqrt(dx*dx + dy*dy) < 30) this.active = false;
      }
      draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - Math.cos(this.angle) * this.length, this.y - Math.sin(this.angle) * this.length);
        ctx.stroke();
      }
    }

    const kawaiiUrls = [
      "https://i.imgur.com/evumoOa.png", "https://i.imgur.com/mtCNLpb.png", 
      "https://i.imgur.com/eYdIGQl.png", "https://i.imgur.com/VBW0rG5.png", 
      "https://i.imgur.com/Qp1ji37.png", "https://i.imgur.com/udN1aRV.png", 
      "https://i.imgur.com/ozU4Bv1.png", "https://i.imgur.com/ZculhIg.png", 
      "https://i.imgur.com/jNKlb8A.png"
    ];

    class SuckedPlanet {
      constructor(url, index) {
        this.img = new Image();
        this.img.src = url;
        
        const angle = Math.random() * Math.PI * 2;
        const diag = Math.sqrt(Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2)) / 2;
        const startDist = diag + 100 + Math.random() * 200; 
        
        this.x = targetX + Math.cos(angle) * startDist;
        this.y = targetY + Math.sin(angle) * startDist;
        this.size = 60 + Math.random() * 40;
        this.rotation = Math.random() * 360;
        
        this.delay = (index * 30) + (Math.random() * 150); 
        this.speedMultiplier = 0.008 + Math.random() * 0.01;
        this.active = true;
      }
      update() {
        if (this.delay > 0) { this.delay--; return; }
        
        const dx = targetX - this.x;
        const dy = targetY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 20) { this.active = false; return; }
        
        const speed = Math.min(8, Math.max(1.5, dist * this.speedMultiplier)); 
        
        this.x += (dx / dist) * speed;
        this.y += (dy / dist) * speed;
        this.rotation += 2 + (speed * 0.4); 
        this.size *= 0.99; 
      }
      draw() {
        if (this.delay > 0 || !this.img.complete) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        ctx.drawImage(this.img, -this.size/2, -this.size/2, this.size, this.size);
        ctx.restore();
      }
    }

    function renderLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let isAnimating = false;

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].active) { particles[i].draw(); isAnimating = true; }
        else particles.splice(i, 1);
      }

      for (let i = warpLines.length - 1; i >= 0; i--) {
        warpLines[i].update();
        if (warpLines[i].active) { warpLines[i].draw(); isAnimating = true; }
        else warpLines.splice(i, 1);
      }

      if (!isUniverseDestroyed) {
        if (clickCount >= 5 && clickCount < 10) {
          if (Math.random() > 0.3) warpLines.push(new WarpLine(false));
          isAnimating = true;
        } else if (singularityActive) {
          for(let i=0; i<2; i++) warpLines.push(new WarpLine(true));
          isAnimating = true;
        }
      }

      let activePlanets = 0;
      for (let i = suckedPlanets.length - 1; i >= 0; i--) {
        suckedPlanets[i].update();
        if (suckedPlanets[i].active) { 
          suckedPlanets[i].draw(); 
          activePlanets++; 
          isAnimating = true; 
        }
      }

      if (singularityActive && activePlanets === 0 && suckedPlanets.length > 0) {
        triggerEndFlash();
      }

      if (isAnimating) {
        animationId = requestAnimationFrame(renderLoop);
      } else {
        animationId = null;
      }
    }

    function startLoopIfNeeded() {
      if (!animationId) {
        resize();
        animationId = requestAnimationFrame(renderLoop);
      }
    }

    function handleLogoClick(e) {
      if (isUniverseDestroyed || singularityActive) return;
      
      clickCount++;
      clearTimeout(clickResetTimer);

      if (clickCount >= 1 && clickCount < 5) {
        for(let i=0; i<15; i++) particles.push(new ShortAspirationParticle());
        startLoopIfNeeded();
      } 
      else if (clickCount >= 5 && clickCount < 10) {
        startLoopIfNeeded();
      } 
      else if (clickCount === 10) {
        singularityActive = true;
        document.getElementById('dark-overlay').style.opacity = '0.9';
        
        kawaiiUrls.forEach((url, index) => {
          suckedPlanets.push(new SuckedPlanet(url, index));
        });

        startLoopIfNeeded();
      }

      if (clickCount < 10) {
        clickResetTimer = setTimeout(() => { clickCount = 0; }, 1500);
      }
    }

    function triggerEndFlash() {
      singularityActive = false;
      isUniverseDestroyed = true;
      suckedPlanets = []; 
      
      const flash = document.getElementById('flash-overlay');
      flash.style.opacity = '1';
      flash.style.transition = 'opacity 0.1s ease-out';
      
      setTimeout(() => {
        document.body.classList.add('universe-destroyed');
        document.getElementById('space-container').innerHTML = ''; 
        document.getElementById('dark-overlay').style.display = 'none';
        
        flash.style.transition = 'opacity 2s ease-in';
        flash.style.opacity = '0';
      }, 150);
    }

    // --- SYSTEME DE PLANETES D'AMBIANCE (NORMAL) ---
    const ambientPlanetUrls = [
      "https://i.imgur.com/evumoOa.png", "https://i.imgur.com/mtCNLpb.png", 
      "https://i.imgur.com/eYdIGQl.png", "https://i.imgur.com/VBW0rG5.png", 
      "https://i.imgur.com/Qp1ji37.png", "https://i.imgur.com/udN1aRV.png", 
      "https://i.imgur.com/ozU4Bv1.png", "https://i.imgur.com/ZculhIg.png", 
      "https://i.imgur.com/jNKlb8A.png"
    ];
    
    const container = document.getElementById("space-container");
    const ambientPlanets = [];
    
    function spawnPlanetOffscreen(p) {
      if (isUniverseDestroyed || singularityActive) return; 
      p.el.src = ambientPlanetUrls[Math.floor(Math.random() * ambientPlanetUrls.length)];
      const size = Math.floor(Math.random() * (112 - 40 + 1)) + 40; 
      p.size = size; p.el.style.width = size + "px"; p.el.style.height = size + "px";
      p.el.style.display = "block"; p.active = true;
      
      const edge = Math.floor(Math.random() * 4);
      if (edge === 0) { p.x = Math.random() * window.innerWidth; p.y = -size - 20; p.dx = (Math.random() - 0.5) * 1.5; p.dy = Math.random() * 0.8 + 0.3; }
      else if (edge === 1) { p.x = window.innerWidth + size + 20; p.y = Math.random() * window.innerHeight; p.dx = -(Math.random() * 0.8 + 0.3); p.dy = (Math.random() - 0.5) * 1.5; }
      else if (edge === 2) { p.x = Math.random() * window.innerWidth; p.y = window.innerHeight + size + 20; p.dx = (Math.random() - 0.5) * 1.5; p.dy = -(Math.random() * 0.8 + 0.3); }
      else { p.x = -size - 20; p.y = Math.random() * window.innerHeight; p.dx = Math.random() * 0.8 + 0.3; p.dy = (Math.random() - 0.5) * 1.5; }
      p.rotation = Math.random() * 360; p.dr = (Math.random() - 0.5) * 1.5;
    }
    
    const img = document.createElement("img");
    img.className = "planet"; 
    img.style.display = "none";
    container.appendChild(img);
    const p = { el: img, active: false };
    
    img.addEventListener("click", () => {
      if (!p.active || isUniverseDestroyed || singularityActive) return;
      
      p.dx = (Math.random() - 0.5) * 4;
      p.dy = (Math.random() - 0.5) * 4;
      p.dr = (Math.random() - 0.5) * 5;
    });

    ambientPlanets.push(p);
    setTimeout(() => spawnPlanetOffscreen(p), 1000); 
    
    function animateAmbientPlanets() {
      ambientPlanets.forEach(p => {
        if (!p.active) return;
        p.x += p.dx; p.y += p.dy; p.rotation += p.dr;
        const margin = p.size + 100;
        if (p.x > window.innerWidth + margin || p.x < -margin || p.y > window.innerHeight + margin || p.y < -margin) {
          p.active = false; p.el.style.display = "none";
          setTimeout(() => spawnPlanetOffscreen(p), Math.random() * 2000 + 1000);
        } else {
          p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rotation}deg)`;
        }
      });
      requestAnimationFrame(animateAmbientPlanets);
    }
    animateAmbientPlanets();

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.innerText = msg; toast.className = "show";
      setTimeout(() => toast.className = "", 3000);
    }
    function copyEmail() {
      navigator.clipboard.writeText("contact@plutonh.com").then(() => showToast("✅ Email copié !"));
    }
  </script>
</body>
</html>
